
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kanchipuram Silk Saree Gallery | Vastrakala</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Inline CSS -->
    <style>
        body {
            background-color: #fbf7f2;
            font-family: 'Segoe UI', sans-serif;
        }

        .gallery-section {
            padding: 60px 0;
        }

        .gallery-title {
            text-align: center;
            font-size: 2.4rem;
            font-weight: bold;
            color: #6b0f1a;
            margin-bottom: 40px;
        }

        .saree-img {
            width: 100%;
            height: 250px;
            object-fit: cover; /* keeps horizontal look */
            border-radius: 15px;
            box-shadow: 0 10px 22px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }

        .saree-img:hover {
            transform: scale(1.05);
        }

        .info-box {
            margin-top: 50px;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .info-box p {
            font-size: 1.05rem;
            color: #555;
            line-height: 1.8;
            text-align: justify;
        }
    </style>
</head>
<body>

<section class="gallery-section">
    <div class="container">

        <h2 class="gallery-title">Kanchipuram Silk Saree Collection</h2>

        <!-- Image Row -->
        <div class="row g-4">

            <div class="col-md-4">
                <img src="https://i.pinimg.com/originals/65/27/9e/65279e23ce3801a2bada81bd2c5b1a3b.jpg"
                     alt="Kanchipuram Silk Saree Design 1"
                     class="saree-img">
            </div>

            <div class="col-md-4">
                <img src="https://i.pinimg.com/originals/0e/76/17/0e76172007307aed97c213347a0c1662.jpg"
                     alt="Kanchipuram Silk Saree Design 2"
                     class="saree-img">
            </div>

            <div class="col-md-4">
                <img src="https://i.pinimg.com/originals/5c/a0/4a/5ca04a48ea337cb23adff7b38fb16332.jpg"
                     alt="Kanchipuram Silk Saree Design 3"
                     class="saree-img">
            </div>

        </div>

        <!-- Information Paragraph -->
        <div class="info-box">
            <p>
                Kanchipuram silk sarees are handwoven silk sarees from Tamil Nadu, known for their rich fabric, gold zari work, and temple-inspired designs. They are GI-tagged products and widely worn during weddings and festivals as a symbol of South Indian cultural heritage.
            </p>
        </div>

    </div>
</section>

</body>
</html>
